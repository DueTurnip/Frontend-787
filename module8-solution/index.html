<!DOCTYPE html>
<html ng-app="NarrowItDownApp" lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/angular.min.js"></script>
        <script src="js/app.js"></script>
        <title>Buzz</title>
    </head>
    <body>
        <div ng-controller="NarrowItDownController as list">
            <div id="searchbar">
                <input type="text" ng-model="list.searchTerm">
                <button ng-click="list.search()">Narrow It Down For Me!</button>
            </div>
            <found-items items="list.items" on-remove="list.removeItem(index)"></found-items>
        </div>
    </body>
</html>
